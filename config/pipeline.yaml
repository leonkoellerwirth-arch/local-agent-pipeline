# Pipeline configuration: models per role, timeouts, retry behaviour.
# Defaults are small, broadly available models so the repo runs on modest
# hardware. The reviewer intentionally uses a different model from the worker
# so the check is not the checker grading its own homework.

# Each role's model is addressed as `provider:model`. With no prefix the
# provider is `ollama` (local), so `llama3.2` means `ollama:llama3.2`. To route
# a role to an external provider for stronger review, prefix it and set the
# matching key in `.env` (see `.env.example`):
#   reviewer: openai:gpt-4o
#   reviewer: gemini:gemini-1.5-pro
#   reviewer: claude:claude-sonnet-4-5
# Local is the default; external providers are opt-in and recorded in the audit
# trail (the `model` field shows exactly which model made each decision).
models:
  planner: llama3.2
  worker: llama3.2
  reviewer: llama3.1   # independent second opinion (a different local model)

llm:
  host: http://localhost:11434   # default Ollama endpoint
  timeout_s: 120
  temperature: 0.0               # deterministic-ish; this is extraction, not prose
  max_retries: 1                 # one retry with error feedback, then abort

# Guards for the optional local web console (web/api_server.py). It binds to
# localhost only and drives real pipeline runs, so these keep a stray local
# process or a malicious web page from abusing it. The shared session token is
# generated at startup (or taken from $API_TOKEN) — behaviour, not a secret, is
# what lives here.
web:
  max_body_bytes: 262144          # 256 KiB — larger POST bodies get 413
  max_concurrent_runs: 4          # more in-flight runs than this get 429
  decision_timeout_s: 900         # unanswered human review fails safe (reject)
  allowed_origins:                # browser Origin must be one of these (else 403)
    - http://127.0.0.1:5173
    - http://localhost:5173

audit:
  # Directory for the JSONL trail. One file per run: <log_dir>/<run_id>.jsonl
  log_dir: runs
  # When true, prompts and outputs are also written as plaintext next to the
  # trail. Off by default: the trail keeps only hashes so logs can be shared
  # without leaking document contents. See README "A note on privacy".
  dump_plaintext: false
  dump_dir: runs/dumps
