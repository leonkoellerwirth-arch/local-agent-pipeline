# Policy: the guardrails. All risk behaviour is declared here, never in code.
# Change a threshold or add a trigger without touching a single .py file.

# The planner may only emit steps whose action is in this set. Steps outside
# the space are discarded and logged (a demonstration of action-space limiting).
action_space:
  - classify
  - extract
  - summarize

# Below this self-reported confidence, a result is escalated to a human even
# if nothing else looks wrong. Low confidence is itself a risk signal.
min_confidence: 0.6

risk_triggers:
  # Regex heuristics for personally identifiable information. These are a first
  # pass, deliberately conservative; the reviewer LLM adds a second judgement.
  pii_patterns:
    email: '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
    iban: '\b[A-Z]{2}\d{2}(?:[ ]?[A-Z0-9]){11,30}\b'
    phone: '\b(?:\+\d{1,3}[ -]?)?(?:\(?\d{2,4}\)?[ -]?){2,4}\d{2,4}\b'

  # Monetary amounts at or above this value (in EUR) escalate. The pipeline
  # should never auto-approve a high-value contract.
  contract_value_threshold_eur: 100000

# What each reviewer decision means for the run. Documented here so the mapping
# is explicit rather than buried in reviewer.py.
escalation:
  on_pass: continue        # accept the result, proceed
  on_escalate: gate        # pause, hand to the human-in-the-loop gate
  on_reject: abort         # stop the run, write an audit event
