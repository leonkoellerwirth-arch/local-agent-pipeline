name: Release

# Cut a release from a version tag: build the Python distribution, attach a
# cryptographic build-provenance attestation (keyless — GitHub's OIDC identity,
# no signing keys to manage), and publish a GitHub Release with the artifacts.
# Verify a downloaded artifact later with:  gh attestation verify <file> --repo <owner>/<repo>
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC identity for keyless signing
  attestations: write # record the provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
